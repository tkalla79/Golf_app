services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
      - wordpress
    restart: unless-stopped

  app:
    build: .
    expose:
      - "3000"
    env_file: .env
    volumes:
      - avatars_data:/app/public/avatars
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: donpapa
      MYSQL_USER: donpapa
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/init-wordpress-db.sql:/docker-entrypoint-initdb.d/init-wordpress-db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  wordpress:
    image: wordpress:6-apache
    expose:
      - "80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: donpapa
      WORDPRESS_DB_PASSWORD: ${DB_PASSWORD}
      WORDPRESS_DB_NAME: wordpress
    volumes:
      - wordpress_data:/var/www/html
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: builder
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push"
    profiles:
      - tools

  seed:
    build:
      context: .
      target: builder
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma db push --force-reset && npx tsx prisma/seed.ts"
    profiles:
      - tools

volumes:
  mysql_data:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
  avatars_data:
    driver: local
  uploads_data:
    driver: local
  wordpress_data:
    driver: local
